services:
  - type: web
    name: easystore
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: HOST
        value: 0.0.0.0
      - key: EASYSTORE_STORE_ID
        value: loja-matriz
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: PAYMENT_GATEWAY_MODE
        value: mock
      - key: PAYMENT_PROVIDER_NAME
        value: Stone
      - key: PAYMENT_API_BASE_URL
        sync: false
      - key: PAYMENT_API_KEY
        sync: false
      - key: PAYMENT_API_SECRET
        sync: false
      - key: PAYMENT_LOG_PATH
        value: data/payment-transactions.json
      - key: PAYMENT_PROVIDER_CONFIG_PATH
        value: data/payment-provider-config.json
      - key: PAYMENT_PROVIDER_CONFIG_JSON
        sync: false
      - key: NCM_LOCAL_JSON_PATH
        value: Tabela_NCM_Vigente_20260331.json
      - key: NCM_CACHE_TTL_MS
        value: 43200000
      - key: NCM_SUPABASE_CANDIDATE_LIMIT
        value: 120
      - key: AUTO_SYNC_NCM_ON_STARTUP
        value: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: NFE_AMBIENTE
        value: homolog
      - key: NFE_UF
        value: MS
      - key: NFE_CERT_PATH
        value: certificados/certificado-a1.pfx
      - key: NFE_CERT_BASE64
        sync: false
      - key: NFE_CERT_PASSWORD
        sync: false
      - key: NFE_CNPJ_EMITENTE
        sync: false
      - key: NFE_IE_EMITENTE
        sync: false
      - key: NFE_RAZAO_SOCIAL
        sync: false
      - key: NFE_LOGRADOURO
        sync: false
      - key: NFE_NUMERO
        value: S/N
      - key: NFE_BAIRRO
        sync: false
      - key: NFE_MUNICIPIO
        sync: false
      - key: NFE_CEP
        sync: false
